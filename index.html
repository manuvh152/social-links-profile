<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/style.css">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    footer { position: fixed; bottom: 0; }
    .attribution { font-size: 11px; color: white; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  
    <main>
      <article class="card">
        <div class="user-info">
          <img class="user-pic" src="assets/images/avatar-jessica.jpeg"/>
          <h1>Jessica Randall</h1>
          <h2>London, United Kingdom</h2>
          <h3>"Front-end developer and avid reader."</h3>
        </div>
        <ul class="socials">
          <li class="social">Github</li>
          <li class="social">Frontend Mentor</li>
          <li class="social">LinkedIn</li>
          <li class="social">Twitter</li>
          <li class="social">Instagram</li>
        </ul>
      </article>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io/challenges/social-links-profile-UG32l9m6dQ" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://www.frontendmentor.io/profile/manuvh152">Manuel Alonso Vargas</a>.
    </footer>

</body>
</html>
